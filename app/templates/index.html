{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">Moji Računi</h1>

<div class="d-flex justify-content-between align-items-center mb-4">
    <form method="GET" action="/" class="d-inline-block">
        <select name="month" class="form-select w-auto shadow-sm" onchange="this.form.submit()">
            {% for m in months %}
            <option value="{{ m }}" {% if m==selected_month %}selected{% endif %}>{{ m }}</option>
            {% endfor %}
            {% if not months %}
            <option disabled selected>No data</option>
            {% endif %}
        </select>
    </form>
    <div class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 fs-6 px-3 py-2 rounded-pill">
        {{ "%.2f"|format(total_spent) }} RSD
    </div>
</div>

<form method="POST" action="/" class="mb-4 shadow-sm rounded">
    <div class="input-group">
        <input type="url" class="form-control form-control-lg border-0" name="url" placeholder="Upiši URL računa i klikni ENTER..." required autocomplete="off">
        <button class="btn btn-primary px-4 fw-semibold" type="submit">Dodaj</button>
    </div>
</form>

<div class="d-flex flex-column gap-2">
    {% for r in receipts %}
    <a href="/receipt/{{ r.id }}" class="card text-decoration-none text-dark shadow-sm border-0 transition-transform" style="transition: transform 0.2s;">
        <div class="card-body p-3">
            <h5 class="card-title mb-1 fs-6">{{ r.company_name }}</h5>
            <div class="d-flex justify-content-between text-secondary small">
                <span>{{ r.invoice_date[:10] }}</span>
                <span class="fw-bold text-dark">{{ "%.2f"|format(r.total_amount) }} RSD</span>
            </div>
        </div>
    </a>
    {% else %}
    <p class="text-center text-muted mt-4">Nema računa za ovaj mesec.</p>
    {% endfor %}
</div>

<style>
    .transition-transform:hover {
        transform: translateY(-2px);
    }
</style>
{% endblock %}
